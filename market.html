<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Mobil - PT Suksestama Automobil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --navy: #0a1f3b;
            --gold: #d4a017;
            --silver: #c0c0c0;
            --dark: #1a1a1a;
            --white: #ffffff;
            --light-bg: #f5f5f5;
            --metallic: #2c3e50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light-bg);
            color: #333;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            bottom: -40px;
            right: -80px;
            width: 500px;
            height: 250px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300"><path d="M50 200 L80 150 L150 150 L180 120 L420 120 L450 150 L520 150 L550 200 L560 200 L560 220 L40 220 Z" fill="%23d4a017" opacity="0.06"/><circle cx="180" cy="210" r="35" fill="%23d4a017" opacity="0.06"/><circle cx="420" cy="210" r="35" fill="%23d4a017" opacity="0.06"/></svg>') no-repeat;
            background-size: contain;
            z-index: -1;
            pointer-events: none;
        }

        .navbar {
            background: linear-gradient(135deg, var(--navy), var(--metallic));
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-bottom: 3px solid var(--gold);
        }

        .navbar .logo-text {
            color: var(--white);
            font-size: 20px;
            font-weight: bold;
        }

        .navbar .logo-text span { color: var(--gold); }
        .navbar .jargon { color: var(--gold); font-size: 13px; font-style: italic; }

        .navbar .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .navbar .nav-links a {
            color: var(--white);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            transition: 0.3s;
            font-size: 14px;
        }

        .navbar .nav-links a:hover { background: rgba(255,255,255,0.1); }
        .navbar .nav-links a.btn-gold {
            background: var(--gold);
            color: var(--navy);
            font-weight: bold;
        }

        .section {
            padding: 40px 50px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .section h2 {
            color: var(--navy);
            margin-bottom: 25px;
            font-size: 28px;
        }

        .car-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }

        .car-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            border: 1px solid #e8e8e8;
            transition: 0.3s;
        }

        .car-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            border-color: var(--gold);
        }

        .car-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #bbb;
        }

        .car-info {
            padding: 20px;
        }

        .car-info h3 {
            color: var(--navy);
            margin-bottom: 10px;
            font-size: 18px;
        }

        .car-info .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
            font-size: 14px;
        }

        .car-info .detail-row:last-child { border-bottom: none; }

        .car-info .label { color: #888; }
        .car-info .value { font-weight: bold; color: var(--navy); }
        .car-info .value.green { color: #0d7a3f; }
        .car-info .value.gold { color: var(--gold); }

        .slot-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        .slot-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), #e6b800);
            border-radius: 10px;
        }

        .btn-buy {
            width: 100%;
            padding: 12px;
            background: var(--navy);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-buy:hover { background: var(--gold); color: var(--navy); }

        .badge-close {
            background: #c62828;
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-active {
            background: #0d7a3f;
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--navy);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div>
            <div class="logo-text">PT <span>Suksestama</span> Automobil</div>
            <div class="jargon">" Pasti Untung dan Termurah "</div>
        </div>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Beranda</a>
            <a href="login-investor.html" class="btn-gold"><i class="fas fa-sign-in-alt"></i> Login untuk Beli</a>
        </div>
    </div>

    <div class="section">
        <h2>🚗 List Mobil Tokenisasi</h2>
        <p style="color:#666;margin-bottom:25px;">Berikut adalah unit kendaraan yang sedang ditokenisasi. Login sebagai investor untuk membeli token.</p>

        <div class="car-grid" id="carGrid">
            <!-- Diisi JavaScript -->
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
    </div>

    <script>
        function getUnits() {
            let units = JSON.parse(localStorage.getItem('tokenUnits') || '[]');
            if (units.length === 0) {
                units = [
                    {
                        id: 1,
                        nama: 'Toyota Vellfire 2.4 AT',
                        tahun: 2011,
                        hargaBeli: 108000000,
                        totalToken: 50,
                        tokenTerjual: 32,
                        asumsiHargaJual: 135000000,
                        status: 'active',
                        foto: ''
                    },
                    {
                        id: 2,
                        nama: 'Honda CR-V 1.5 Turbo',
                        tahun: 2018,
                        hargaBeli: 245000000,
                        totalToken: 50,
                        tokenTerjual: 18,
                        asumsiHargaJual: 290000000,
                        status: 'active',
                        foto: ''
                    },
                    {
                        id: 3,
                        nama: 'Mitsubishi Pajero Sport',
                        tahun: 2020,
                        hargaBeli: 320000000,
                        totalToken: 50,
                        tokenTerjual: 50,
                        asumsiHargaJual: 380000000,
                        status: 'close',
                        foto: ''
                    }
                ];
                localStorage.setItem('tokenUnits', JSON.stringify(units));
            }
            return units;
        }

        function renderMarket() {
            const units = getUnits();
            const grid = document.getElementById('carGrid');
            grid.innerHTML = '';

            units.forEach(unit => {
                const hargaPerToken = Math.ceil(unit.hargaBeli / unit.totalToken);
                const sisa = unit.totalToken - unit.tokenTerjual;
                const persen = Math.round((unit.tokenTerjual / unit.totalToken) * 100);
                const keuntunganTotal = unit.asumsiHargaJual - unit.hargaBeli;
                const untungInvestor = keuntunganTotal * 0.7;
                const untungPerToken = Math.ceil(untungInvestor / unit.totalToken);

                const card = `
                    <div class="car-card">
                        <div class="car-image">
                            ${unit.foto ? `<img src="${unit.foto}" style="width:100%;height:100%;object-fit:cover;">` : '<i class="fas fa-car"></i>'}
                        </div>
                        <div class="car-info">
                            <h3>${unit.nama} (${unit.tahun})</h3>
                            <div class="detail-row"><span class="label">Harga Beli Unit</span><span class="value">Rp ${unit.hargaBeli.toLocaleString('id-ID')}</span></div>
                            <div class="detail-row"><span class="label">Harga per Token</span><span class="value gold">Rp ${hargaPerToken.toLocaleString('id-ID')}</span></div>
                            <div class="detail-row"><span class="label">Slot Tersisa</span><span class="value">${sisa} / ${unit.totalToken}</span></div>
                            <div class="detail-row"><span class="label">Asumsi Harga Jual Terendah</span><span class="value green">Rp ${unit.asumsiHargaJual.toLocaleString('id-ID')}</span></div>
                            <div class="detail-row"><span class="label">Estimasi Laba per Token</span><span class="value green">Rp ${untungPerToken.toLocaleString('id-ID')}</span></div>
                            <div class="detail-row"><span class="label">Status</span>${unit.status === 'active' ? '<span class="badge-active">AKTIF</span>' : '<span class="badge-close">CLOSE</span>'}</div>
                            <div class="slot-bar"><div class="slot-fill" style="width:${persen}%;"></div></div>
                            <small style="color:#888;">${persen}% token terjual</small>
                            ${unit.status === 'active' ? `<a href="login-investor.html"><button class="btn-buy"><i class="fas fa-shopping-cart"></i> Login untuk Beli Token</button></a>` : '<button class="btn-buy" disabled style="background:#ccc;">CLOSE</button>'}
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        renderMarket();
    </script>

</body>
</html>
